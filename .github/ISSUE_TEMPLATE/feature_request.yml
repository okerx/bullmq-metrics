name: Feature request
description: Propose an improvement or new capability
title: '[Feature]: '
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What limitation or gap are you trying to solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you want.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any workarounds or competing approaches you evaluated.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Include operational context, sample metrics, or deployment constraints if useful.
