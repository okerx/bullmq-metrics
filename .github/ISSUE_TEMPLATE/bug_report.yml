name: Bug report
description: Report a reproducible problem with the exporter
title: '[Bug]: '
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the problem and its impact.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Include the image tag, release, or commit SHA if known.
      placeholder: main / commit SHA / local branch

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide a minimal reproduction.
      placeholder: |
        1. Configure ...
        2. Run ...
        3. Scrape ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Share Bun, Redis, BullMQ, and deployment details that matter.

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Redact secrets before pasting output.
      render: shell
