name: Conventional PR Title

on:
  pull_request_target:
    branches:
      - main
    types:
      - opened
      - edited
      - reopened
      - synchronize

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Validate pull request title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          pattern='^(feat|fix|perf|refactor|docs|style|test|build|ci|chore|revert)(\([[:alnum:]_.\/-]+\))?(!)?: .+$'

          if [[ ! "$PR_TITLE" =~ $pattern ]]; then
            echo "Pull request titles targeting main must follow Conventional Commit format."
            echo "Examples:"
            echo "  feat: add queue prefix configuration"
            echo "  fix(redis): close scan client on error"
            echo "  docs: document the release workflow"
            exit 1
          fi
